<!DOCTYPE html>
<html>
    <title>positioning work</title>
    <head>
        <style>
            .sticky{
                position: sticky;
                top: 3px;
                left: 20px;
                background-color: pink;
                border: 2px;
                padding: 5px;
                font-size: 25px;
                opacity: 0.1;
            }
              .relative{
                position: relative;
                bottom: 3px;
                right: 20px;
                background-color: plum;
                border: 2px;
                padding: 6px;
                font-size: 22px;
                opacity: 0.2;
                        }
            .absolute{
                position: absolute;
                top: 4px;
                left: 20px;
                background-color: peachpuff;
                border: 2px;
                padding:6px;
                font-size: 20px;
                opacity: 0.3;
            }
             .fixed{
                position: fixed;
                bottom: 4px;
                right: 20px;
                background-color:lemonchiffon;
                border: 2px;
                padding:6px;
                font-size: 22px;
                opacity: 0.4;
            }
        </style>
    </head>
    <body>
        <h1>The results of positioning</h1>
        <div class="sticky">this is with sticky positioning</div>
        <div class="relative">this is with relative positioning</div>
        <div class="absolute">this is with absolute positioning</div>
        <div class="fixed">this is with fixed positioning</div>

        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    </body>
</html>
