<!DOCTYPE html>
<html>
    <body>
        <h2>javascript loop</h2>
        <p id="demo"></p>
        <script>
            var fruits = ["apple", "banana", "mango", "grapes", "dragonfruit", "pineapple"];
            var text = "";
        var i;
        for (i = 0; i < fruits.length; i++) {
            text += fruits[i] + "<br>";
        }
        document.getElementById("demo").innerHTML= text;
        </script>
    </body>
</html>
