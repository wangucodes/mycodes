<!DOCTYPE html>
<html>
    <head>
    <h2>javascript classes</h2>
</head>
<body>
    <p id="student1"></p>
    <p id="student2"></p>
    <script>
        class student{
            constructor(name , year) {
                this.name = name;
                this.year = year;
        }
        
        age() {
            let date = new Date();
            return date.getFullYear() - this.year;
        }
    }
        const student1 = new student("riya", 2014);
        document.getElementById("student1").innerHTML = 
            "my name is " + student1.name + ". I was born in" +
            student1.year + ". And my age is" + student1.age();

            const student2 = new student("tina", 2018);
            document.getElementById("student2").innerHTML =
        "my name is " + student2.name + ". I was born in" +
        student2.year + ". And my age is" + student2.age();
    </script>        
    </body>
</html>
